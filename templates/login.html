<!DOCTYPE html>
<html>
<head>
  <title>Login - Smart AI Attendance</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h2>Login</h2>
  <form method="POST">
    <label>Role:</label>
    <select name="role">
      <option value="admin">Admin</option>
      <option value="student">Student</option>
    </select><br>
    <input type="text" name="username" placeholder="Email/Roll No" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
  </form>
</body>
</html>
